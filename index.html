<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StandBy Clock V3.1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 10px;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .panel {
            background-color: #0d0d0d;
            border-radius: 28px;
            border: 1px solid #222;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
        }

        /* KHUNG ĐỒNG HỒ */
        .clock-panel {
            flex: 1;
            width: 100%;
            height: 100%;
            transition: all 0.3s ease;
        }

        /* Chế độ Full Màn Hình */
        .container.full-mode .slideshow-panel {
            display: none;
        }

        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #888888;
            font-weight: 600;
            z-index: 5;
        }

        /* Nút Chuyển đổi Chế độ */
        .toggle-btn {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* KHẮC PHỤC LỖI TRÀN SỐ: Dùng clamp & vh/vw chuẩn cho 1/2 màn hình */
        .time-display {
            font-size: clamp(4rem, 14vw, 12vh);
            font-weight: 900;
            letter-spacing: -1px;
            color: #ffffff;
            line-height: 1;
            margin: auto 0;
            text-align: center;
            white-space: nowrap;
        }

        /* Số cỡ cực đại khi ở chế độ Full screen */
        .container.full-mode .time-display {
            font-size: clamp(6rem, 25vw, 22vh);
        }

        .date-badge {
            background-color: #222222;
            padding: 6px 18px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #e0e0e0;
        }

        /* KHUNG SLIDESHOW */
        .slideshow-panel {
            flex: 1;
            height: 100%;
            padding: 0;
            justify-content: center;
            position: relative;
        }

        .slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 28px;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slide-img.active {
            display: block;
        }

        /* KHẮC PHỤC BỊ CHE: Nút chọn ảnh chuyển lên mép TRÊN CÙNG BÊN PHẢI */
        .photo-picker-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .photo-picker-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #file-input {
            display: none;
        }

        #wake-video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="wake-video" loop playsinline muted>
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAdtZGF0AAAAAA==" type="video/mp4">
    </video>

    <div class="container" id="main-container">
        <div class="panel clock-panel">
            <div class="status-bar">
                <button class="toggle-btn" id="toggle-mode-btn" onclick="toggleDisplayMode()">🔲 Chế độ: 1/2</button>
                <span id="battery">🔋 --%</span>
            </div>

            <div class="time-display" id="time">00:00</div>

            <div class="date-badge" id="date">Đang tải...</div>
        </div>

        <div class="panel slideshow-panel" id="slideshow-panel">
            <button class="photo-picker-btn" id="upload-btn" onclick="document.getElementById('file-input').click()">
                📷 Chọn ảnh
            </button>
            <input type="file" id="file-input" multiple accept="image/*">

            <img class="slide-img active default-img" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80" alt="Default 1">
            <img class="slide-img default-img" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=800&q=80" alt="Default 2">
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // --- GIỮ MÀN HÌNH LUÔN SÁNG ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        const video = document.getElementById('wake-video');
        function activateKeepAwake() {
            requestWakeLock();
            if (video) video.play().catch(() => {});
        }

        document.addEventListener('click', activateKeepAwake);
        document.addEventListener('touchstart', activateKeepAwake);

        // --- ĐỒNG HỒ & PIN ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').innerText = `${hours}:${minutes}`;

            const options = { weekday: 'long', day: '2-digit', month: 'short' };
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', options);
        }

        if ('getBattery' in navigator) {
            navigator.getBattery().then(battery => {
                function updateBattery() {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('battery').innerText = `🔋 ${level}%`;
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        }

        setInterval(updateClock, 1000);
        updateClock();

        // --- SLIDESHOW (30 GIÂY) ---
        let currentSlideIndex = 0;
        let slideInterval = null;
        const uploadBtn = document.getElementById('upload-btn');
        const slideshowPanel = document.getElementById('slideshow-panel');

        function startSlideshow() {
            const images = document.querySelectorAll('.slide-img');
            if (images.length === 0) return;

            if (slideInterval) clearInterval(slideInterval);

            slideInterval = setInterval(() => {
                images[currentSlideIndex].classList.remove('active');
                currentSlideIndex = (currentSlideIndex + 1) % images.length;
                images[currentSlideIndex].classList.add('active');
            }, 30000); 
        }

        document.getElementById('file-input').addEventListener('change', function(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            document.querySelectorAll('.slide-img').forEach(img => img.remove());

            Array.from(files).forEach((file, index) => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.classList.add('slide-img');
                if (index === 0) img.classList.add('active');
                slideshowPanel.appendChild(img);
            });

            currentSlideIndex = 0;
            startSlideshow();

            uploadBtn.classList.add('hidden');
        });

        slideshowPanel.addEventListener('click', function(e) {
            if (e.target !== uploadBtn) {
                uploadBtn.classList.toggle('hidden');
            }
        });

        startSlideshow();

        // --- CHUYỂN ĐỔI CHẾ ĐỘ FULL / SPLIT ---
        function toggleDisplayMode() {
            const container = document.getElementById('main-container');
            const btn = document.getElementById('toggle-mode-btn');

            if (container.classList.contains('full-mode')) {
                container.classList.remove('full-mode');
                btn.innerText = '🔲 Chế độ: 1/2';
            } else {
                container.classList.add('full-mode');
                btn.innerText = '🖥️ Chế độ: Full';
            }
        }
    </script>
</body>
</html>
