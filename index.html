<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StandBy Clock</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .clock-card {
            background-color: #000000;
            width: 90vw;
            height: 80vh;
            border-radius: 32px;
            border: 2px solid #222;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: #a0a0a0;
            font-weight: 500;
        }

        .time-display {
            font-size: 22vw;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            line-height: 1;
        }

        .date-badge {
            background-color: #222222;
            padding: 8px 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="clock-card">
        <div class="status-bar">
            <span>⏰ 07:30 AM</span>
            <span id="battery">🔋 --%</span>
        </div>

        <div class="time-display" id="time">00:00</div>

        <div class="date-badge" id="date">Đang tải...</div>
    </div>

    <script>
        // Đăng ký Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').innerText = `${hours}:${minutes}`;

            const options = { weekday: 'long', day: '2-digit', month: 'short' };
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', options);
        }

        if ('getBattery' in navigator) {
            navigator.getBattery().then(battery => {
                function updateBattery() {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('battery').innerText = `🔋 ${level}%`;
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
