<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StandBy Clock V4.2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 8px;
            gap: 8px;
            transition: all 0.3s ease;
            flex-direction: row;
        }

        /* TỰ ĐỘNG XOAY THEO HƯỚNG MÀN HÌNH */
        @media (orientation: portrait) {
            .container {
                flex-direction: column;
            }
        }

        .panel {
            background-color: #0d0d0d;
            border-radius: 24px;
            border: 1px solid #222;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
        }

        .clock-panel {
            flex: 1;
            width: 100%;
            height: 100%;
            transition: all 0.3s ease;
        }

        .container.full-mode .slideshow-panel {
            display: none;
        }

        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #888888;
            font-weight: 600;
            z-index: 5;
        }

        .toggle-btn {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .time-wrapper {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .time-display {
            font-size: 35vh; 
            font-weight: 900;
            letter-spacing: -3px;
            color: #ffffff;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        @media (orientation: portrait) {
            .time-display {
                font-size: 18vw;
            }
        }

        .container.full-mode .time-display {
            font-size: 65vh;
        }

        .date-badge {
            background-color: #222222;
            padding: 4px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #e0e0e0;
        }

        .slideshow-panel {
            flex: 1;
            width: 100%;
            height: 100%;
            padding: 0;
            justify-content: center;
            position: relative;
        }

        .slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slide-img.active {
            display: block;
        }

        .picker-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            display: flex;
            gap: 6px;
            transition: opacity 0.3s ease;
        }

        .picker-box.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .photo-picker-btn {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        #file-input-photos, #file-input-files {
            display: none;
        }

        #wake-video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="wake-video" loop playsinline muted>
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAdtZGF0AAAAAA==" type="video/mp4">
    </video>

    <div class="container" id="main-container">
        <div class="panel clock-panel">
            <div class="status-bar">
                <button class="toggle-btn" id="toggle-mode-btn" onclick="toggleDisplayMode()">🔲 Chế độ 1/2</button>
                <span id="battery">🔋 --%</span>
            </div>

            <div class="time-wrapper" id="time-wrapper">
                <div class="time-display" id="time">00:00</div>
            </div>

            <div class="date-badge" id="date">Đang tải...</div>
        </div>

        <div class="panel slideshow-panel" id="slideshow-panel">
            <div class="picker-box" id="picker-box">
                <button class="photo-picker-btn" onclick="document.getElementById('file-input-photos').click()">
                    🖼️ Photos
                </button>
                <button class="photo-picker-btn" onclick="document.getElementById('file-input-files').click()">
                    📁 Tệp máy
                </button>
            </div>

            <input type="file" id="file-input-photos" multiple accept="image/*">
            <input type="file" id="file-input-files" multiple accept="*/*">

            <img class="slide-img active default-img" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80" alt="Default 1">
            <img class="slide-img default-img" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=800&q=80" alt="Default 2">
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // --- GIỮ MÀN HÌNH LUÔN SÁNG ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        const video = document.getElementById('wake-video');
        function activateKeepAwake() {
            requestWakeLock();
            if (video) video.play().catch(() => {});
        }

        document.addEventListener('click', activateKeepAwake);
        document.addEventListener('touchstart', activateKeepAwake);

        // --- ĐỒNG HỒ & PIN & TỰ ĐỘNG CÂN CHỈNH FONT GIỜ TRÀN VIỀN ---
        function fitTimeDisplay() {
            const timeEl = document.getElementById('time');
            const wrapper = document.getElementById('time-wrapper');
            if (!timeEl || !wrapper) return;

            timeEl.style.transform = 'scale(1)';
            
            const wrapperWidth = wrapper.clientWidth;
            const timeWidth = timeEl.scrollWidth;

            if (timeWidth > wrapperWidth && wrapperWidth > 0) {
                const scale = wrapperWidth / timeWidth;
                timeEl.style.transform = `scale(${scale * 0.98})`;
            } else {
                timeEl.style.transform = 'scale(1)';
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const newTime = `${hours}:${minutes}`;
            
            const timeEl = document.getElementById('time');
            if (timeEl.innerText !== newTime) {
                timeEl.innerText = newTime;
                fitTimeDisplay();
            }

            const options = { weekday: 'long', day: '2-digit', month: 'short' };
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', options);
        }

        window.addEventListener('resize', fitTimeDisplay);

        if ('getBattery' in navigator) {
            navigator.getBattery().then(battery => {
                function updateBattery() {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('battery').innerText = `🔋 ${level}%`;
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        }

        setInterval(updateClock, 1000);
        updateClock();

        // --- SLIDESHOW (30 GIÂY) ---
        let currentSlideIndex = 0;
        let slideInterval = null;
        const pickerBox = document.getElementById('picker-box');
        const slideshowPanel = document.getElementById('slideshow-panel');

        function startSlideshow() {
            const images = document.querySelectorAll('.slide-img');
            if (images.length === 0) return;

            if (slideInterval) clearInterval(slideInterval);

            slideInterval = setInterval(() => {
                images[currentSlideIndex].classList.remove('active');
                currentSlideIndex = (currentSlideIndex + 1) % images.length;
                images[currentSlideIndex].classList.add('active');
            }, 30000); 
        }

        function handleFileSelect(files) {
            if (!files || files.length === 0) return;

            document.querySelectorAll('.slide-img').forEach(img => img.remove());

            Array.from(files).forEach((file, index) => {
                // Chỉ nhận các tệp là hình ảnh
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.classList.add('slide-img');
                    if (index === 0) img.classList.add('active');
                    slideshowPanel.appendChild(img);
                }
            });

            currentSlideIndex = 0;
            startSlideshow();

            pickerBox.classList.add('hidden');
        }

        document.getElementById('file-input-photos').addEventListener('change', (e) => handleFileSelect(e.target.files));
        document.getElementById('file-input-files').addEventListener('change', (e) => handleFileSelect(e.target.files));

        slideshowPanel.addEventListener('click', function(e) {
            if (!pickerBox.contains(e.target)) {
                pickerBox.classList.toggle('hidden');
            }
        });

        startSlideshow();

        // --- CHUYỂN ĐỔI CHẾ ĐỘ FULL / SPLIT ---
        function toggleDisplayMode() {
            const container = document.getElementById('main-container');
            const btn = document.getElementById('toggle-mode-btn');

            if (container.classList.contains('full-mode')) {
                container.classList.remove('full-mode');
                btn.innerText = '🔲 Chế độ 1/2';
            } else {
                container.classList.add('full-mode');
                btn.innerText = '🖥️ Chế độ Full';
            }
            setTimeout(fitTimeDisplay, 50);
        }
    </script>
</body>
</html>
